<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哪吒-裁切</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* Apple 设计语言色彩体系 */
        :root { 
            --sys-bg: #F5F5F7; --card-bg: #FFFFFF; --text-main: #1D1D1F; --text-sec: #86868B; 
            --accent: #007AFF; --ai-accent: #9B51E0; --danger: #FF3B30; --border: #E5E5EA;
            --radius-lg: 18px; --radius-md: 12px; --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--sys-bg); margin: 0; padding: 40px 20px; color: var(--text-main); }
        .container { max-width: 1000px; margin: 0 auto; }
        .panel { background: var(--card-bg); padding: 30px; border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); margin-bottom: 24px; }
        
        #drop-zone { width: 100%; border: 2px dashed #C7C7CC; border-radius: var(--radius-md); padding: 40px; cursor: pointer; text-align: center; box-sizing: border-box; transition: 0.2s; background: #FAFAFA; color: var(--text-sec); font-size: 16px; font-weight: 500; }
        #drop-zone:hover { border-color: var(--accent); background: #F0F8FF; color: var(--accent); }

        .segmented-control { display: inline-flex; flex-wrap: wrap; justify-content: center; background: #EFEFF4; padding: 4px; border-radius: 10px; margin-top: 20px; gap: 4px; }
        .btn-size { padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-sec); font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-size.active { background: var(--card-bg); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .panel-title { font-size: 18px; font-weight: 600; }
        
        .btn-outline { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text-main); cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; }
        .btn-outline:hover { border-color: var(--text-main); }

        .control-group { display: flex; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .control-group label { font-size: 14px; color: var(--text-sec); width: 80px; }
        input[type=range] { flex: 1; -webkit-appearance: none; height: 6px; background: #E5E5EA; border-radius: 3px; outline: none; min-width: 150px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; border: 1px solid #ddd; }
        .val-tag { width: 45px; text-align: right; font-size: 14px; color: var(--text-main); font-variant-numeric: tabular-nums; }

        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 10px;}
        .img-card { background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-soft); transition: 0.3s; border: 1px solid var(--border); position: relative; }
        .img-card:hover { transform: translateY(-4px); }
        .img-wrapper { width: 100%; height: 220px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; overflow: hidden; }
        .img-wrapper img.main-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .logo-preview-overlay { position: absolute; pointer-events: none; z-index: 20; display: none; overflow: hidden; }
        .logo-preview-overlay img { width: 100%; height: 100%; object-fit: contain; position: absolute; }
        .crop-mask { position: absolute; border: 1.5px solid rgba(255,255,255,0.9); box-shadow: 0 0 0 5000px rgba(0,0,0,0.6); pointer-events: none; z-index: 10; }
        
        .del-btn { position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; background: rgba(255,255,255,0.8); color: var(--text-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 30; font-size: 16px; transition: 0.2s; }
        .del-btn:hover { background: var(--danger); color: white; transform: scale(1.1); }

        .card-footer { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); }
        .card-label { font-size: 12px; color: var(--text-sec); font-weight: 500; }
        .card-action { font-size: 13px; color: var(--accent); font-weight: 600; cursor: pointer; }

        .btn-main { background: var(--accent); color: white; width: 100%; padding: 16px; font-size: 17px; border: none; border-radius: 14px; cursor: pointer; margin-top: 30px; font-weight: 600; transition: 0.2s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        .btn-main:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4); }
        .btn-main:disabled { background: #A1C6EA; cursor: wait; box-shadow: none; }

        .api-input-wrap { display: flex; gap: 10px; margin-top: 15px; }
        .api-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .api-input:focus { border-color: var(--ai-accent); box-shadow: 0 0 0 3px rgba(155,81,224,0.1); }
        .ai-tag { font-size: 10px; color: white; background: var(--ai-accent); padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; flex-direction: column; }
        .cropper-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: hidden; }
        #editor-img { max-width: 100%; display: block; }
        .modal-footer { background: var(--card-bg); padding: 20px 40px; display: flex; gap: 15px; justify-content: center; border-radius: 24px 24px 0 0; flex-wrap: wrap; }
        .btn-modal { padding: 12px 30px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: #E5E5EA; color: var(--text-main); }
        .btn-confirm { background: var(--text-main); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel" style="text-align: center;">
        <div id="drop-zone">拖拽图片至此处上传</div>
        <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
        
        <div class="segmented-control">
            <button onclick="setGlobalPixel(1200, 1200, '1200x1200', this)" class="btn-size active">1200 × 1200</button>
            <button onclick="setGlobalPixel(1200, 1600, '1200x1600', this)" class="btn-size">1200 × 1600</button>
            <button onclick="setGlobalPixel(800, 1200, '800x1200', this)" class="btn-size">800 × 1200</button>
            <button onclick="setGlobalPixel(750, 1000, '750x1000', this)" class="btn-size">750 × 1000</button>
        </div>
    </div>

    <div class="panel" style="border: 1px solid rgba(155, 81, 224, 0.2); background: linear-gradient(180deg, #FFFFFF 0%, #FAFAFC 100%);">
        <div class="panel-header" style="margin-bottom: 5px;">
            <div class="panel-title" style="color: var(--ai-accent);">✨ 创成式生成背景</div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="ai-toggle" style="width:16px; height:16px; cursor:pointer;" checked>
                <label for="ai-toggle" style="font-size:14px; cursor:pointer; font-weight: 500;">开启智能外扩</label>
            </div>
        </div>
        <p style="font-size: 12px; color: var(--text-sec); margin: 0 0 15px 0;">开启后，超出裁切框的部分将自动生成背景融合。</p>
        <div class="api-input-wrap">
            <input type="password" id="api-key" class="api-input" placeholder="请输入 Gemini API Key (仅本地存储)">
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">水印配置 <span style="font-size:13px; font-weight:normal; color:var(--text-sec); margin-left:8px;">(黑白切换)</span></div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn-outline" id="load-logo-1" onclick="document.getElementById('logo-file-1').click()">加载水印 1</button>
                <button class="btn-outline" id="load-logo-2" onclick="document.getElementById('logo-file-2').click()">加载水印 2</button>
            </div>
            <input type="file" id="logo-file-1" accept="image/png, image/jpeg" style="display:none" onchange="loadLogo(this.files, 1)">
            <input type="file" id="logo-file-2" accept="image/png, image/jpeg" style="display:none" onchange="loadLogo(this.files, 2)">
        </div>
        
        <div id="logo-ctrls" style="display:none; margin-top:10px; padding-top:15px; border-top:1px solid var(--border);">
            <div class="control-group">
                <label>左右偏移</label><input type="range" id="lx" min="0" max="100" value="95" oninput="updateLogoUI()"><span class="val-tag" id="lx-v">95%</span>
            </div>
            <div class="control-group">
                <label>垂直偏移</label><input type="range" id="ly" min="0" max="100" value="95" oninput="updateLogoUI()"><span class="val-tag" id="ly-v">95%</span>
            </div>
            <div class="control-group">
                <label>缩放比例</label><input type="range" id="ls" min="5" max="40" value="12" oninput="updateLogoUI()"><span class="val-tag" id="ls-v">12%</span>
            </div>
        </div>
    </div>

    <div class="preview-grid" id="preview-grid"></div>
    <button class="btn-main" id="zip-btn" onclick="downloadZip()">📦 智能合成并导出 ZIP</button>
</div>

<div id="modal">
    <div class="cropper-box"><img id="editor-img"></div>
    <div class="modal-footer">
        <button class="btn-modal btn-cancel" onclick="closeEditor(false)">取消</button>
        <button class="btn-modal btn-confirm" onclick="closeEditor(true)">确认裁切</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let items = [];
    let curW = 1200, curH = 1200, curLabel = "1200x1200";
    let logoImages = { 1: null, 2: null }; 
    let logoSrcs = { 1: "", 2: "" };
    let activeLogos = {}; 
    let editIdx = null, cropper = null;

    // 向内羽化的过渡带宽度
    const FEATHER_RADIUS = 6;

    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    const fIn = document.getElementById('file-input');
    const dz = document.getElementById('drop-zone');
    dz.onclick = () => fIn.click();
    fIn.onchange = (e) => handleFiles(e.target.files);
    dz.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
    dz.ondragover = (e) => e.preventDefault();

    async function handleFiles(files) {
        if (!files.length) return;
        const zipBtn = document.getElementById('zip-btn');
        const originalText = zipBtn.innerText;
        zipBtn.disabled = true; zipBtn.innerText = "预处理中...";

        for (const file of Array.from(files)) {
            if (!file.type.startsWith('image/')) continue;
            try {
                const data = await preCompress(file, 3000);
                const itemId = Date.now() + Math.random();
                activeLogos[itemId] = 1; 
                items.push({
                    file: file, imgEl: data.el, src: data.src, cropData: null,
                    targetW: curW, targetH: curH, label: curLabel, id: itemId
                });
            } catch (err) { console.error(err); }
        }
        render();
        zipBtn.disabled = false; zipBtn.innerText = originalText; fIn.value = ""; 
    }

    function preCompress(file, max) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if (w > max || h > max) {
                        if (w > h) { h = (max/w)*h; w = max; } else { w = (max/h)*w; h = max; }
                    }
                    const cvs = document.createElement('canvas');
                    cvs.width = w; cvs.height = h;
                    cvs.getContext('2d').drawImage(img, 0, 0, w, h);
                    const src = cvs.toDataURL('image/jpeg', 0.9);
                    const el = new Image();
                    el.onload = () => resolve({ el, src });
                    el.src = src;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function loadLogo(files, num) {
        if (!files[0]) return;
        const r = new FileReader();
        r.onload = (e) => {
            logoSrcs[num] = e.target.result;
            const newLogoImg = new Image();
            newLogoImg.onload = () => {
                logoImages[num] = newLogoImg;
                const btn = document.getElementById(`load-logo-${num}`);
                btn.innerText = `已激活 (${num})`;
                btn.style.borderColor = "var(--accent)"; btn.style.color = "var(--accent)";
                document.getElementById('logo-ctrls').style.display = 'flex';
                render(); updateLogoUI();
            };
            newLogoImg.src = e.target.result;
        };
        r.readAsDataURL(files[0]);
    }

    function switchActiveLogo(itemId, num, event) {
        if(event) event.stopPropagation(); 
        if(!logoImages[num]) return alert(`请先加载水印 ${num} 图！`);
        activeLogos[itemId] = num;
        render(); 
    }

    function updateLogoUI() {
        const xPct = document.getElementById('lx').value, yPct = document.getElementById('ly').value, sPct = document.getElementById('ls').value;
        document.getElementById('lx-v').innerText = xPct + '%'; document.getElementById('ly-v').innerText = yPct + '%'; document.getElementById('ls-v').innerText = sPct + '%';

        document.querySelectorAll('.logo-preview-overlay').forEach((ov, idx) => {
            if(!ov) return;
            const item = items[idx];
            if(!item || !logoImages[activeLogos[item.id]]) { ov.style.display = 'none'; return; }
            ov.style.display = 'block'; ov.style.width = '100%'; ov.style.height = '100%';
            const logoImgEl = ov.querySelector('img');
            if(logoImgEl){
                logoImgEl.style.width = sPct + '%'; logoImgEl.style.height = sPct + '%';
                logoImgEl.style.left = xPct + '%'; logoImgEl.style.top = yPct + '%';
                logoImgEl.style.transform = `translate(-${xPct}%, -${yPct}%)`;
            }
        });
    }

    function deleteItem(idx, event) { event.stopPropagation(); items.splice(idx, 1); render(); }

    function checkOutbound(item) {
        if (!item.cropData) return false;
        const { x, y, width, height } = item.cropData;
        const imgW = item.imgEl.width, imgH = item.imgEl.height;
        return (x < -1 || y < -1 || (x + width) > imgW + 1 || (y + height) > imgH + 1);
    }

    function render() {
        const grid = document.getElementById('preview-grid');
        grid.innerHTML = '';
        items.forEach((item, index) => {
            const currentActiveLogoNum = activeLogos[item.id];
            const currentLogoSrc = logoSrcs[currentActiveLogoNum]; 
            const isOut = checkOutbound(item);

            const card = document.createElement('div');
            card.className = 'img-card';
            if(isOut) card.style.border = "1px solid var(--ai-accent)";

            card.innerHTML = `
                <button class="del-btn" onclick="deleteItem(${index}, event)">×</button>
                <div class="img-wrapper" onclick="openEditor(${index})">
                    <img src="${item.src}" class="main-img" id="prev-${index}">
                    <div class="crop-mask" id="mask-${index}"></div>
                    <div class="logo-preview-overlay" id="logo-ov-${index}">
                        ${currentLogoSrc ? `<img src="${currentLogoSrc}" style="display:block;">` : ''}
                    </div>
                </div>
                <div class="card-footer" style="flex-direction:column; gap:10px; align-items:flex-start;">
                    <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                        <span class="card-label">${item.label} ${isOut ? '<span class="ai-tag">✨ 外扩融合</span>' : ''}</span>
                        <a class="card-action" onclick="openEditor(${index})">${item.cropData ? '● 已微调' : '调整位置'}</a>
                    </div>
                    <div class="segmented-control" style="width:100%; margin:0; padding:2px; display:${(logoImages[1] || logoImages[2]) ? 'flex' : 'none'}">
                        <button onclick="switchActiveLogo(${item.id}, 1, event)" class="btn-size ${currentActiveLogoNum === 1 ? 'active' : ''}" style="width:50%; font-size:11px; padding:5px 10px;">LOGO (1)</button>
                        <button onclick="switchActiveLogo(${item.id}, 2, event)" class="btn-size ${currentActiveLogoNum === 2 ? 'active' : ''}" style="width:50%; font-size:11px; padding:5px 10px;">LOGO (2)</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
            const img = document.getElementById(`prev-${index}`);
            img.onload = () => { updateMask(index); updateLogoUI(); };
            if(img.complete) { updateMask(index); updateLogoUI(); }
        });
    }

    function updateMask(idx) {
        const item = items[idx], img = document.getElementById(`prev-${idx}`), mask = document.getElementById(`mask-${idx}`);
        if (!img || !mask || img.clientWidth === 0) return;
        const scale = img.clientWidth / img.naturalWidth;
        const targetRatio = item.targetW / item.targetH;
        let mW, mH, mX, mY;
        
        if (item.cropData) {
            mW = item.cropData.width * scale; mH = item.cropData.height * scale;
            mX = item.cropData.x * scale; mY = item.cropData.y * scale;
        } else {
            if (img.naturalWidth / img.naturalHeight > targetRatio) { mH = img.clientHeight; mW = mH * targetRatio; } 
            else { mW = img.clientWidth; mH = mW / targetRatio; }
            mX = (img.clientWidth - mW) / 2; mY = (img.clientHeight - mH) / 2;
        }
        mask.style.width = mW + 'px'; mask.style.height = mH + 'px';
        mask.style.left = (img.offsetLeft + mX) + 'px'; mask.style.top = (img.offsetTop + mY) + 'px';
        
        const ov = document.getElementById(`logo-ov-${idx}`);
        if(ov) {
            ov.style.width = mW + 'px'; ov.style.height = mH + 'px';
            ov.style.left = (img.offsetLeft + mX) + 'px'; ov.style.top = (img.offsetTop + mY) + 'px';
        }
    }

    async function downloadZip() {
        if (items.length === 0) return alert('请先上传图片');
        
        const isAiEnabled = document.getElementById('ai-toggle').checked;
        const apiKey = document.getElementById('api-key').value.trim();
        
        const hasOutbound = items.some(item => checkOutbound(item));
        if (isAiEnabled && hasOutbound && !apiKey) return alert('检测到有需要 AI 外扩的图片，请先输入 API Key！');

        if (apiKey) localStorage.setItem('gemini_api_key', apiKey); 

        const btn = document.getElementById('zip-btn');
        btn.disabled = true;
        
        const zip = new JSZip();
        const folder = zip.folder("导出_智能裁切集");

        for (let i = 0; i < items.length; i++) {
            let blob;
            if (isAiEnabled && checkOutbound(items[i])) {
                btn.innerText = `✨ AI 延展融合中 (${i + 1}/${items.length})...`;
                try {
                    blob = await processWithAI(items[i], apiKey);
                } catch (e) {
                    alert(`第 ${i+1} 张图生成失败，跳过。报错: ${e.message}`); continue; 
                }
            } else {
                btn.innerText = `处理合成第 (${i + 1}/${items.length}) 张...`;
                blob = await processToBlobTraditional(items[i]);
            }

            const name = items[i].file.name.replace(/\.[^/.]+$/, "");
            folder.file(`${name}_${items[i].label}.png`, blob);
        }

        btn.innerText = "正在封装 ZIP...";
        const content = await zip.generateAsync({ type: "blob" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `Media_Export_${Date.now()}.zip`;
        link.click();
        
        btn.disabled = false; btn.innerText = "📦 智能合成并导出 ZIP";
    }

    // --- ✨ 终极透明通道垫图 + 内部羽化融合算法 ✨ ---
    async function processWithAI(item, apiKey) {
        return new Promise(async (resolve, reject) => {
            try {
                // 1. 精确计算原图在目标裁切框内的坐标映射
                const destW = (item.imgEl.width / item.cropData.width) * item.targetW;
                const destH = (item.imgEl.height / item.cropData.height) * item.targetH;
                const destX = (-item.cropData.x / item.cropData.width) * item.targetW;
                const destY = (-item.cropData.y / item.cropData.height) * item.targetH;

                // 2. 🛡️ 【透明通道发图大法】 🛡️
                // 绝对不填白色底！我们要发送一张带有真实 Alpha 透明度边缘的图，这样 AI 才懂要填哪里
                const cvs = document.createElement('canvas');
                cvs.width = item.targetW; cvs.height = item.targetH;
                const ctx = cvs.getContext('2d');
                
                ctx.clearRect(0, 0, item.targetW, item.targetH); // 保证周边是绝对透明的
                ctx.drawImage(item.imgEl, destX, destY, destW, destH);
                
                // 必须使用 image/png 才能保留我们刚才清理出来的透明边框
                const pureBase64 = cvs.toDataURL('image/png').split(',')[1];

                // 3. 呼叫 Gemini 进行背景外扩
                const url = `https://vip.123everything.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${apiKey}`;
                // 优化提示词：直接点破 "transparent"（透明）区域
                const prompt = "Task: Image Outpainting. The outer edges of this image are perfectly transparent. Please seamlessly extend and generate the missing background to completely fill the transparent areas naturally. Match the style, lighting, and texture of the central artwork. Do not modify the central image.";
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: pureBase64 } }] }] })
                });

                if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);
                const resData = await response.json();
                
                let generatedBase64 = null;
                if (resData.candidates && resData.candidates[0].content.parts[0].inlineData) {
                    generatedBase64 = `data:${resData.candidates[0].content.parts[0].inlineData.mimeType};base64,${resData.candidates[0].content.parts[0].inlineData.data}`;
                } else { throw new Error("API 返回的数据异常"); }

                // 4. ✨ 【终极融合阶段：向原图内扩展羽化融合】 ✨
                const aiImg = new Image();
                aiImg.onload = () => {
                    try {
                        const finalCvs = document.createElement('canvas');
                        finalCvs.width = item.targetW; finalCvs.height = item.targetH;
                        const finalCtx = finalCvs.getContext('2d');

                        // A. 将 AI 传回来的图铺满底层
                        const imgRatio = aiImg.width / aiImg.height;
                        const targetRatio = item.targetW / item.targetH;
                        let drawW, drawH, drawX, drawY;

                        if (imgRatio > targetRatio) {
                            drawH = item.targetH; drawW = drawH * imgRatio;
                            drawX = (item.targetW - drawW) / 2; drawY = 0;
                        } else {
                            drawW = item.targetW; drawH = drawW / imgRatio;
                            drawX = 0; drawY = (item.targetH - drawH) / 2;
                        }
                        // 垫上 AI 画的底图
                        finalCtx.drawImage(aiImg, drawX, drawY, drawW, drawH);
                        
                        // B. 构建内部羽化遮罩 (Feather Mask)
                        const maskCvs = document.createElement('canvas');
                        maskCvs.width = item.targetW; maskCvs.height = item.targetH;
                        const maskCtx = maskCvs.getContext('2d');
                        
                        // 创造一个向内收缩并高斯模糊的黑色区域
                        const safeFeather = Math.min(FEATHER_RADIUS, destW / 3, destH / 3);
                        maskCtx.filter = `blur(${safeFeather}px)`;
                        maskCtx.fillStyle = 'black';
                        maskCtx.fillRect(destX + safeFeather, destY + safeFeather, destW - safeFeather * 2, destH - safeFeather * 2);
                        maskCtx.filter = 'none';
                        
                        // C. 将你的原始高清画稿，嵌进被高斯模糊的区域，边缘变透明
                        maskCtx.globalCompositeOperation = 'source-in';
                        maskCtx.drawImage(item.imgEl, destX, destY, destW, destH);
                        
                        // D. 将边缘柔和透出 AI 底图的原图，完美盖在最终画布上！
                        finalCtx.drawImage(maskCvs, 0, 0);

                        // E. 最终合成水印
                        const activeLogoNum = activeLogos[item.id];
                        const currentLogoImg = logoImages[activeLogoNum]; 
                        if (currentLogoImg) {
                            const sVal = parseInt(document.getElementById('ls').value);
                            const lH = item.targetH * (sVal/100);
                            const lW = lH * (currentLogoImg.width / currentLogoImg.height);
                            const xVal = parseInt(document.getElementById('lx').value);
                            const yVal = parseInt(document.getElementById('ly').value);
                            finalCtx.drawImage(currentLogoImg, (item.targetW * (xVal/100)) - (lW * (xVal/100)), (item.targetH * (yVal/100)) - (lH * (yVal/100)), lW, lH);
                        }
                        finalCvs.toBlob(blob => resolve(blob), 'image/png');
                    } catch (e) {
                        reject(e);
                    }
                };
                aiImg.onerror = () => reject(new Error("读取 AI 生成图片流失败"));
                aiImg.src = generatedBase64;
            } catch (err) { reject(err); }
        });
    }

    // 传统合成 Blob (传统模式我们使用白底，防止 PNG 发暗)
    function processToBlobTraditional(item) {
        return new Promise(res => {
            const cvs = document.createElement('canvas');
            cvs.width = item.targetW; cvs.height = item.targetH;
            const ctx = cvs.getContext('2d');
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, item.targetW, item.targetH);

            if (item.cropData) {
                const destW = (item.imgEl.width / item.cropData.width) * item.targetW;
                const destH = (item.imgEl.height / item.cropData.height) * item.targetH;
                const destX = (-item.cropData.x / item.cropData.width) * item.targetW;
                const destY = (-item.cropData.y / item.cropData.height) * item.targetH;
                ctx.drawImage(item.imgEl, destX, destY, destW, destH);
            } else {
                const targetRatio = item.targetW / item.targetH;
                let sx, sy, sw, sh;
                if ((item.imgEl.width/item.imgEl.height) > targetRatio) {
                    sh = item.imgEl.height; sw = item.imgEl.height * targetRatio; sx = (item.imgEl.width - sw) / 2; sy = 0;
                } else { sw = item.imgEl.width; sh = item.imgEl.width / targetRatio; sx = 0; sy = (item.imgEl.height - sh) / 2; }
                ctx.drawImage(item.imgEl, sx, sy, sw, sh, 0, 0, item.targetW, item.targetH);
            }

            const activeLogoNum = activeLogos[item.id];
            const currentLogoImg = logoImages[activeLogoNum];
            if (currentLogoImg) {
                const sVal = parseInt(document.getElementById('ls').value);
                const lH = item.targetH * (sVal/100);
                const lW = lH * (currentLogoImg.width / currentLogoImg.height);
                const xVal = parseInt(document.getElementById('lx').value);
                const yVal = parseInt(document.getElementById('ly').value);
                ctx.drawImage(currentLogoImg, (item.targetW * (xVal/100)) - (lW * (xVal/100)), (item.targetH * (yVal/100)) - (lH * (yVal/100)), lW, lH);
            }
            cvs.toBlob(blob => res(blob), 'image/png');
        });
    }

    function setGlobalPixel(w, h, label, btn) {
        document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('active')); btn.classList.add('active');
        curW = w; curH = h; curLabel = label;
        items.forEach(item => { item.targetW = w; item.targetH = h; item.label = label; item.cropData = null; });
        render();
    }

    function openEditor(idx) {
        editIdx = idx; document.getElementById('modal').style.display = 'flex';
        const edImg = document.getElementById('editor-img');
        if (cropper) cropper.destroy();
        edImg.onload = () => { cropper = new Cropper(edImg, { aspectRatio: items[idx].targetW / items[idx].targetH, viewMode: 0, checkOrientation: false, autoCropArea: 0.8, data: items[idx].cropData }); };
        edImg.src = items[idx].src;
    }

    function closeEditor(save) {
        if (save && cropper) items[editIdx].cropData = cropper.getData();
        document.getElementById('modal').style.display = 'none'; render();
    }
</script>
